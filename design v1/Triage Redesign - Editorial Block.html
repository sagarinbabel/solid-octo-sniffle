<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Triage Redesign — Editorial Block</title>
  <style>
    html, body { margin: 0; padding: 0; background: #1a1a18; }
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="redesign-blue.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    function Notes() {
      return (
        <div style={{ width: 920, background: "#FFFFFF", color: "#0A0A0A", fontFamily: "'Helvetica Neue', Helvetica, Arial, sans-serif", padding: "0", border: "1px solid #0A0A0A" }}>
          <div style={{ background: "#0A0A0A", color: "#FFFFFF", padding: "20px 40px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ width: 18, height: 18, background: "#1B3DFF" }} />
              <div style={{ fontSize: 18, fontWeight: 700, letterSpacing: 4 }}>TRIAGE</div>
            </div>
            <div style={{ fontSize: 11, letterSpacing: 1.5, opacity: 0.7, textTransform: "uppercase" }}>Design notes · Editorial Block</div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "440px 1fr", minHeight: 320 }}>
            <div style={{ background: "#1B3DFF", color: "#FFFFFF", padding: "48px 40px" }}>
              <div style={{ fontSize: 11, letterSpacing: 2, textTransform: "uppercase", fontWeight: 700, opacity: 0.85 }}>System</div>
              <h1 style={{ fontSize: 38, fontWeight: 700, lineHeight: 1.05, letterSpacing: -0.8, margin: "16px 0 0" }}>Hard split. Black header. One blue.</h1>
              <p style={{ marginTop: 18, fontSize: 14, lineHeight: 1.55, opacity: 0.95 }}>
                The reference image works because it commits — vivid blue, hard right edge, no gradient softening, no rounded corners. This redesign borrows that posture for an internal review tool: structured briefs deserve structural confidence.
              </p>
            </div>
            <div style={{ padding: "40px", fontSize: 14, lineHeight: 1.6, color: "#2A2A2A" }}>
              <div style={{ fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase", color: "#6B6B6B", fontWeight: 700, marginBottom: 14 }}>Three screens</div>
              <ol style={{ margin: 0, paddingLeft: 22, display: "flex", flexDirection: "column", gap: 12 }}>
                <li><b>Submit</b> — the form lives next to the blue brand block. Field labels are eyebrows; values are statements. No drop-shadows, no rounded inputs.</li>
                <li><b>Queue</b> — a vivid blue hero anchors the selected request. A black decision strip carries the verdict. Original/Structured sit as a true side-by-side, not stacked cards.</li>
                <li><b>Method</b> — the pipeline is one wide grid bordered in 1px ink. Five cells, five steps. The "what it does / doesn't" pair are split halves of one block.</li>
              </ol>
            </div>
          </div>

          <div style={{ borderTop: "1px solid #0A0A0A", padding: "24px 40px", background: "#F4F4F2", fontSize: 13, color: "#2A2A2A", display: "flex", gap: 36, lineHeight: 1.5 }}>
            <div><b>Type</b> · Helvetica throughout, mono for IDs/codes only</div>
            <div><b>Color</b> · Black, white, electric blue (#1B3DFF), warning orange (#FF3D00) — used once</div>
            <div><b>Geometry</b> · 1px hairlines, no radii, no shadows</div>
          </div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas title="Triage — Editorial Block">
          <DCSection id="notes" title="System notes">
            <DCArtboard id="notes" label="Design system in one paragraph" width={920} height={620}>
              <Notes />
            </DCArtboard>
          </DCSection>

          <DCSection id="screens" title="Three screens">
            <DCArtboard id="submit" label="Sales Portal · Submit" width={1280} height={900}>
              <window.SubmitScreen />
            </DCArtboard>
            <DCArtboard id="queue" label="Head of Software · Queue" width={1280} height={2580}>
              <window.QueueScreen />
            </DCArtboard>
            <DCArtboard id="method" label="Method · How it works" width={1280} height={1140}>
              <window.MethodScreen />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
