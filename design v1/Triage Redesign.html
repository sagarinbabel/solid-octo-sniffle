<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Request Triage — Redesign</title>
  <style>
    html, body { margin: 0; padding: 0; background: #1a1a18; }
    body { font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="redesign.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    // Critique panel — appears as the first artboard
    function Critique() {
      return (
        <div style={{ width: 920, background: "#FAF7F1", color: "#1A1814", fontFamily: "Inter, sans-serif", padding: "56px 64px" }}>
          <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500&family=Inter:wght@400;500;600&display=swap" />
          <div style={{ fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase", color: "#8A8276", fontWeight: 600 }}>Design notes</div>
          <h1 style={{ fontFamily: "'Source Serif 4', Georgia, serif", fontSize: 36, fontWeight: 500, margin: "10px 0 28px", letterSpacing: -0.5, lineHeight: 1.15 }}>
            Why the current UI feels noisy — and the system I'm proposing
          </h1>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 40, fontSize: 14, lineHeight: 1.65, color: "#3A352D" }}>
            <div>
              <div style={{ fontSize: 11, letterSpacing: 1, textTransform: "uppercase", color: "#B23A1F", fontWeight: 700, marginBottom: 10 }}>Diagnosis</div>
              <ol style={{ margin: 0, paddingLeft: 18, display: "flex", flexDirection: "column", gap: 12 }}>
                <li><b>Six colors compete.</b> Slate, cyan, amber, rose, emerald pills + cyan accent button + dark teal/blue radial gradient. Every category screams equally.</li>
                <li><b>Heavy chrome everywhere.</b> Rounded cards inside grids inside borders inside glow shadows. The structure is louder than the content.</li>
                <li><b>The proposition is buried.</b> The actual story — <i>messy in, structured out, human review</i> — is hidden behind a "How it Works" tab.</li>
                <li><b>Pills aren't earning their shape.</b> Most of them are key-value labels (deadline, model, sensitivity). Only <i>interrupt allowed/blocked</i> is a real binary signal.</li>
                <li><b>No hierarchy in the queue.</b> Every row, status, deadline, and route is the same weight. The eye has no entry point.</li>
              </ol>
            </div>

            <div>
              <div style={{ fontSize: 11, letterSpacing: 1, textTransform: "uppercase", color: "#B23A1F", fontWeight: 700, marginBottom: 10 }}>Proposed system</div>
              <ul style={{ margin: 0, paddingLeft: 18, display: "flex", flexDirection: "column", gap: 12, listStyle: "none" }}>
                <li><b>One signal color.</b> A single warm accent (<span style={{ display: "inline-block", width: 10, height: 10, background: "#B23A1F", verticalAlign: "middle", marginRight: 4 }} /> #B23A1F) reserved for risk and "interrupt blocked." Everything else lives on a tonal grayscale.</li>
                <li><b>Flat off-white background.</b> No gradient, no glow. A warm paper tone (#FAF7F1 / #F7F7F5) reads as serious without being clinical.</li>
                <li><b>Typography does the hierarchy.</b> A serif headline for the brief, sans for body, mono for data fields and IDs. Small caps eyebrows replace pills as section labels.</li>
                <li><b>Lead with the transformation.</b> The original messy paragraph and the structured brief sit side-by-side as the hero — that <i>is</i> the product.</li>
                <li><b>One pill, one job.</b> Reserve the boxed/colored callout exclusively for "Software interrupt: BLOCKED." That's the decision the reviewer is making.</li>
                <li><b>Workflow inline, not in a tab.</b> A 3-step strip ("Sales submits → AI structures → Reviewer routes") at the top makes the loop self-evident.</li>
              </ul>
            </div>
          </div>

          <div style={{ marginTop: 36, padding: 20, background: "#FFFFFF", border: "1px solid #E6E2DA", fontSize: 14, lineHeight: 1.6 }}>
            <b>Three directions to the right →</b> Same data, same flow, three takes on minimalism. Open any one fullscreen to compare.
            <div style={{ display: "flex", gap: 28, marginTop: 14, fontSize: 13, color: "#5A544A" }}>
              <span><b style={{ color: "#1A1814" }}>1 · Editorial</b> — reads like a memo. Most restrained.</span>
              <span><b style={{ color: "#1A1814" }}>2 · Tabular</b> — ops-console density. Mono everywhere.</span>
              <span><b style={{ color: "#1A1814" }}>3 · Split</b> — the messy→structured story is the layout.</span>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas title="AI Request Triage — Redesign">
          <DCSection id="notes" title="Critique & system">
            <DCArtboard id="critique" label="Diagnosis & proposed system" width={920} height={760}>
              <Critique />
            </DCArtboard>
          </DCSection>

          <DCSection id="options" title="Three minimalist directions">
            <DCArtboard id="editorial" label="1 · Editorial — memo-like, most restrained" width={1280} height={1640}>
              <window.Editorial />
            </DCArtboard>
            <DCArtboard id="tabular" label="2 · Tabular — ops console, mono, dense" width={1280} height={1180}>
              <window.Tabular />
            </DCArtboard>
            <DCArtboard id="split" label="3 · Split — the transformation IS the layout" width={1280} height={1440}>
              <window.Split />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
